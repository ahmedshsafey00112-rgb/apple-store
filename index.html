<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iStore | Experience Innovation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --apple-black: #1d1d1f;
            --apple-gray: #f5f5f7;
            --apple-blue: #0071e3;
            --text-dark: #333;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--white);
            color: var(--apple-black);
            line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- Navigation --- */
        nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            height: 48px;
        }

        .logo { font-weight: 600; font-size: 1.2rem; cursor: pointer; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--apple-black); 
            font-size: 0.85rem; 
            opacity: 0.8;
            transition: var(--transition);
        }
        .nav-links a:hover { opacity: 1; }

        .nav-icons { display: flex; gap: 20px; align-items: center; }
        .cart-icon { position: relative; cursor: pointer; }
        .cart-count {
            position: absolute;
            top: -8px;
            right: -10px;
            background: var(--apple-blue);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* --- Hero Section --- */
        .hero {
            margin-top: 48px;
            text-align: center;
            padding: 80px 20px;
            background: var(--apple-gray);
        }
        .hero h1 { font-size: 3.5rem; font-weight: 600; letter-spacing: -0.02em; }
        .hero p { font-size: 1.5rem; color: #86868b; margin-bottom: 20px; }

        /* --- Search Bar --- */
        .search-container {
            max-width: 500px;
            margin: 20px auto;
            padding: 0 20px;
        }
        #productSearch {
            width: 100%;
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            background: var(--white);
            font-size: 1rem;
            outline: none;
        }

        /* --- Product Grid --- */
        .shop-container {
            max-width: 1200px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .product-card {
            background: var(--white);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .product-card:hover {
            box-shadow: 0 20px 40px rgba(109, 3, 3, 0.08);
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: contain;
            margin-bottom: 20px;
        }

        .product-name { font-size: 1.4rem; font-weight: 600; margin-bottom: 10px; }
        .product-price { color: #424245; margin-bottom: 20px; font-size: 1.1rem; }
        
        .btn-add {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-add:hover { background: #0077ed; opacity: 0.9; }

        /* --- Shopping Cart Sidebar --- */
        .cart-sidebar {
            position: fixed;
            right: -400px;
            top: 0;
            width: 400px;
            height: 100%;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            z-index: 1001;
            transition: var(--transition);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }
        .cart-sidebar.active { right: 0; }
        
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .close-cart { cursor: pointer; font-size: 1.5rem; }

        .cart-items { flex-grow: 1; overflow-y: auto; }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--apple-gray);
        }
        .cart-item img { width: 60px; height: 60px; object-fit: contain; }
        
        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .qty-btn {
            background: var(--apple-gray);
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
        }

        .cart-footer {
            border-top: 1px solid #d2d2d7;
            padding-top: 20px;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .checkout-btn {
            width: 100%;
            background: var(--apple-black);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .cart-sidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="logo">iStore</div>
            <div class="nav-links">
                <a href="#">Store</a>
                <a href="#">icloud</a>
                <a href="#">apple </a>
                <a href="#">microsoft</a>
            </div>
            <div class="nav-icons">
                <div class="cart-icon" onclick="toggleCart()">
                    🛒 <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </nav>

    <section class="hero">
        <h1>Market ELsahfey fro apple id</h1>
        <p>sell all apple id.</p>
        <div class="search-container">
            <input type="text" id="productSearch" placeholder="Search for products..." onkeyup="filterProducts()">
        </div>
    </section>

    <main class="shop-container" id="productGrid">
        </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Bag</h2>
            <span class="close-cart" onclick="toggleCart()">&times;</span>
        </div>
        <div class="cart-items" id="cartItems">
            </div>
        <div class="cart-footer">
            <div class="total-row">
                <span>Total</span>
                <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Check Out</button>
        </div>
    </div>

    <script>
        // --- Product Data ---
        const products = [
            { id: 1, name: "apple outlook", price: 0.25, category: "apple id", img: "https://assets.nn.najah.edu/CACHE/images/uploads/weblog/2019/11/21/outlook-logo-5b106be0ff1b780036cb16f5/bbb81bc05347b866cbba18c050d8e580.jpg" },
            { id: 2, name: "apple hotmail", price: 0.25, category: "hotmail", img: "https://blog.uniquez.co/wp-content/uploads/2022/01/%D8%A5%D9%86%D8%B4%D8%A7%D8%A1-%D8%AD%D8%B3%D8%A7%D8%A8-%D9%87%D9%88%D8%AA%D9%85%D9%8A%D9%84-Hotmail.webp" },
            { id: 3, name: " apple gmail", price: 0.25, category: "gmail", img: "https://cdn.salla.sa/ZYKgn/sRW4Z0UoXP1YemVmvnVaKAIWfEZx7zamz7YKky00.png" },
            { id: 4, name: "icloud", price: 0.25, category: "icloud", img: "https://cdn.arageek.com/magazine/2021/04/encyclopedia-%D8%A7%D8%B3%D8%AA%D8%AE%D8%AF%D8%A7%D9%85-%D8%AD%D8%B3%D8%A7%D8%A8%D8%A7%D8%AA-%D8%A2%D9%8A-%D9%83%D9%84%D8%A7%D9%88%D8%AF-iCloud.jpg" },
            { id: 5, name: "apple id old", price: 0.25, category: "hotmail", img: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEh-YSPviFiX3mYL3FOYzKx-n5gVHSrU4b4Se15OEcrRNW3CxWgPFLFYWTIB6hZOid6ODimv5PklwJxUEuwR9PMQp_Ma_kWHUD6TlIqAVY_-ejv6nkzCo94SwQhqA2QIH0GsbZtF6EbCaIE/s1600/%25D9%2583%25D9%258A%25D9%2581%25D9%258A%25D8%25A9+%25D8%25A5%25D9%2586%25D8%25B4%25D8%25A7%25D8%25A1+%25D8%25AD%25D8%25B3%25D8%25A7%25D8%25A8+%25D8%25B9%25D9%2584%25D9%2589+%25D9%2585%25D8%25AA%25D8%25AC%25D8%25B1+%25D8%25A2%25D8%25A8%25D9%2584.png" },
            { id: 6, name: "icloud old id", price: 0.30, category: "gmail", img: "https://www.daemtube.com/wp-content/uploads/2021/10/%D8%A5%D9%86%D8%B4%D8%A7%D8%A1-%D8%AD%D8%B3%D8%A7%D8%A8-%D8%A3%D8%A8%D9%84-Apple-ID.jpg" }
        ];

        let cart = [];

        // --- Core Functions ---

        function renderProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(product => `
                <div class="product-card">
                    <img src="${product.img}" alt="${product.name}" class="product-image">
                    <h3 class="product-name">${product.name}</h3>
                    <p class="product-price">$${product.price.toLocaleString()}</p>
                    <button class="btn-add" onclick="addToCart(${product.id})">Add to Bag</button>
                </div>
            `).join('');
        }

        function filterProducts() {
            const query = document.getElementById('productSearch').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(query));
            renderProducts(filtered);
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('active');
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const exists = cart.find(item => item.id === productId);

            if (exists) {
                exists.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
        }

        function changeQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            item.quantity += delta;
            if (item.quantity < 1) {
                cart = cart.filter(i => i.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <img src="${item.img}" alt="${item.name}">
                    <div style="flex-grow:1">
                        <h4>${item.name}</h4>
                        <p>$${item.price}</p>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="changeQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="changeQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);

            cartTotal.innerText = `$${total.toLocaleString()}`;
            cartCount.innerText = count;
        }

        function checkout() {
            if (cart.length === 0) return alert("Your bag is empty!");
            alert("Order placed successfully! Thank you for shopping with iStore.");
            cart = [];
            updateCartUI();
            toggleCart();
        }

        // Initialize
        renderProducts(products);
    </script>
</body>
</html>
